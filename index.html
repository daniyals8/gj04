<!DOCTYPE html>
<html>
	<head>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		>
		<style>
			body {
				background-color: #2d132c;
				padding: 20px;
			}
			h1 {
				color: #ee4540;
				text-align: center;
				background: linear-gradient(
                to right,
                #2d132c,
                #7f1437,
                #ee4540,
                #7f1437,
                #2d132c
                );
                background-size: 200%;
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: animate-gradient 3s linear infinite;
	    	}
			@keyframes animate-gradient {
                to {
                background-position: 200%;
                }
            }
			textarea {
				width: 90%;
				margin-left: 2%;
				background-color: #510a32;
				color: #e2e9ec;
				padding: 10px;
				border-width: thin;
				border-color: #ee4540;
			}
			::placeholder {
				color: #b2a0af;
				opacity: 1; /* Required for Firefox to show full color */
			}
			button {
				display: inline-block;
				background-color: #c72b40;
				border: 2px solid;
				/* Light edges on top/left, dark on bottom/right for 3D effect */
				border-color: #ffffff #808080 #808080 #ffffff;
				font-family: "Tahoma", "Arial", sans-serif;
                font-size: 14px;
				color: #2d132c;
				padding: 4px 10px;
				outline: 1px solid black; /* Outer thin border */
				outline-offset: -2px;     /* Aligns outline inside */
				cursor: pointer;
			}  
			.button1 {
				background-color: #38d4bf;
				margin: 0rem 1rem;
			}
			.button2 {
			    background-color: #c0c0c0;
            }
            button:active {
                /* Invert border colors to look "pressed" */
                border-color: #808080 #ffffff #ffffff #808080;
                padding: 5px 9px 3px 11px; /* Slight shift to mimic physical movement */
            }
			#outputText {
				color: #00FF41; /* Neon Matrix Green */
				font-family: 'Courier New', Courier, monospace;
				font-size: 19px;
				font-weight: bold;
				text-shadow: 0 0 5px #00FF41, 0 0 10px #00FF41;
				padding: 15px;
				min-height: 60px;
				white-space: pre-wrap; /* Preserves line breaks */
				word-wrap: break-word;
			}
		</style>
	</head>
	<body>
		<h1>البنائين الأحرار<br>©Gus Joko 4.0</h1>
		<textarea id="inputText" rows="7" placeholder="hello trawas!"></textarea><br><br>
		<button onclick="encryptText()">ENCRYPT</button>
		<button class="button1" onclick="decryptText()">DECRYPT</button>
		<button class="button2" onclick="copyOutput()" id="copyBtn">copy</button>
		<div id="outputText"></div>
		<script>
			// custom dictionary
			const cipherMap = {
				'a': '-', 'b': 'o', 'c': 'b', 'd': 'c', 'e': '(', 'f': 'Ü',
				'g': 'n', 'h': 'V', 'i': '°', 'j': 'E', 'k': 'm', 'l': 'N',
				'm': '&', 'n': 'h', 'o': ')', 'p': 'U', 'q': '¿', 'r': '{',
				's': 'v', 't': 'ɓ', 'u': ',', 'v': 'Û', 'w': 'G', 'x': '≡',
				'y': 'w', 'z': 'Ê', ',': '/', '.': 'X', 'ḍ': 'Q', 'ê': '^',
				'ñ': 'M', 'ṅ': 'L', 'ṇ': 'T', 'ś': 'A', 'ṣ': 'H', 'ṭ': 'C',
			};
			// automatically create a reverse dictionary
			const reverseCipherMap = {};
			for (const key in cipherMap) {
				reverseCipherMap[cipherMap[key]] = key;
			}
			function encryptText() {
				let text = document.getElementById("inputText").value;
				let result = "";
			
				for (let i = 0; i < text.length; i++) {
				  let char = text[i];
				  result += cipherMap[char] ? cipherMap[char] : char;
				}
				// divs use .innerText instead of .value
				document.getElementById("outputText").innerText = result;
			}
			function decryptText() {
				let text = document.getElementById("inputText").value;
				let result = "";
			
				for (let i = 0; i < text.length; i++) {
					let char = text[i];
					// reversed map to decrypt
					result += reverseCipherMap[char] ? reverseCipherMap[char] : char;
				}
			
				document.getElementById("outputText").innerText = result;
			}
		    function copyOutput() {
                let textToCopy = document.getElementById("outputText").innerText;
                // Create a temporary hidden textarea
                let tempInput = document.createElement("textarea");
                tempInput.value = textToCopy;
                tempInput.style.position = "absolute";
                tempInput.style.left = "-9999px"; // Hide it off-screen
                document.body.appendChild(tempInput);
                // Select and copy
                tempInput.select();
                document.execCommand("copy");
                // Clean up
                document.body.removeChild(tempInput);
                // Button animation
                let btn = document.getElementById("copyBtn");
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = "copy"; }, 2000);
            }
		</script>
	</body>
</html>
